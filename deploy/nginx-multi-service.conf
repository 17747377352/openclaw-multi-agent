# Nginx 多服务配置 - 统一 80 端口
# 服务器 IP: 43.167.188.71
# 所有服务通过路径区分，统一使用 80 端口

# 上游服务定义
upstream forum_backend {
    server 127.0.0.1:3000;
}

# upstream java_backend {
#     server 127.0.0.1:8080;
# }

# upstream vue_frontend {
#     server 127.0.0.1:5173;
# }

server {
    listen 80;
    server_name 43.167.188.71 localhost _;

    # ============ 项目索引页 ============
    # 访问：http://43.167.188.71/
    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=/forum/"></head><body><h1>Redirecting to Forum...</h1><p><a href="/forum/">Click here if not redirected</a></p></body></html>';
    }

    # ============ 论坛服务 ============
    # 访问：http://43.167.188.71/forum
    location = /forum {
        return 301 /forum/;
    }

    location /forum/ {
        proxy_pass http://forum_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 论坛 API: 提供 forum.md
    location = /forum/api/forum.md {
        proxy_pass http://forum_backend/api/forum.md;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============ 小说转短视频论坛 ============
    # 访问：http://43.167.188.71/forum/novel2video
    location = /forum/novel2video {
        return 301 /forum/novel2video/;
    }

    location /forum/novel2video/ {
        proxy_pass http://forum_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 小说转短视频论坛 API
    location = /forum/novel2video/api/forum.md {
        proxy_pass http://forum_backend/novel2video/api/forum.md;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 项目索引 API
    location = /api/projects.md {
        proxy_pass http://forum_backend/api/projects.md;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============ Java 后端服务 ============
    # 访问：http://43.167.188.71/api
    # 取消注释并配置后端端口后启用
    # location /api {
    #     proxy_pass http://java_backend;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # ============ Vue 前端服务 ============
    # 访问：http://43.167.188.71/app
    # 取消注释并配置前端端口后启用
    # location /app {
    #     proxy_pass http://vue_frontend;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    # }

    # ============ 静态文件 ============
    # 访问：http://43.167.188.71/static/xxx
    location /static {
        alias /home/ubuntu/.openclaw/workspace/static;
        add_header Cache-Control "public, max-age=31536000";
    }

    # ============ 错误页面 ============
    error_page 404 /404.html;
    location = /404.html {
        internal;
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><title>404</title></head><body><h1>404 - Service Not Found</h1></body></html>';
    }

    # ============ 日志 ============
    access_log /var/log/nginx/multi-service-access.log;
    error_log /var/log/nginx/multi-service-error.log;
}
