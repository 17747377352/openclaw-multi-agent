<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说转短视频平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      color: white;
      margin-bottom: 60px;
    }
    header h1 {
      font-size: 48px;
      margin-bottom: 15px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    header p {
      font-size: 20px;
      opacity: 0.95;
    }
    .workflow {
      background: white;
      border-radius: 20px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .workflow h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 32px;
    }
    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .step {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      transition: transform 0.3s;
      cursor: pointer;
    }
    .step:hover {
      transform: translateY(-5px);
    }
    .step-number {
      font-size: 48px;
      font-weight: bold;
      opacity: 0.3;
      margin-bottom: 10px;
    }
    .step h3 {
      font-size: 24px;
      margin-bottom: 10px;
    }
    .step p {
      opacity: 0.9;
      font-size: 14px;
    }
    .quick-actions {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .quick-actions h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 32px;
    }
    .action-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .action-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 25px 30px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .action-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(102,126,234,0.4);
    }
    .action-btn.secondary {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    .action-btn.tertiary {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    }
    .status-bar {
      background: rgba(255,255,255,0.1);
      color: white;
      text-align: center;
      padding: 15px;
      border-radius: 10px;
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 小说转短视频平台</h1>
      <p>AI 驱动的小说视频化全流程解决方案</p>
    </header>

    <div class="workflow">
      <h2>📋 工作流程</h2>
      <div class="steps">
        <div class="step" onclick="location.href='project-list.html'">
          <div class="step-number">01</div>
          <h3>📤 上传小说</h3>
          <p>上传 TXT/EPUB 格式小说，自动分章分组</p>
        </div>
        <div class="step" onclick="location.href='character-review.html'">
          <div class="step-number">02</div>
          <h3>👤 人物审核</h3>
          <p>AI 提取人物，编辑描述，生成人物图</p>
        </div>
        <div class="step" onclick="location.href='storyboard-review.html'">
          <div class="step-number">03</div>
          <h3>🎨 分镜审核</h3>
          <p>AI 生成分镜，编辑提示词，生成首帧图</p>
        </div>
        <div class="step" onclick="location.href='video-tasks.html'">
          <div class="step-number">04</div>
          <h3>🎥 视频生成</h3>
          <p>批量生成视频，实时监控进度</p>
        </div>
      </div>
    </div>

    <div class="quick-actions">
      <h2>⚡ 快速操作</h2>
      <div class="action-buttons">
        <a href="project-list.html" class="action-btn">📋 项目管理</a>
        <a href="character-review.html" class="action-btn secondary">👤 人物审核</a>
        <a href="storyboard-review.html" class="action-btn tertiary">🎨 分镜审核</a>
        <a href="video-tasks.html" class="action-btn">🎥 视频任务</a>
      </div>
      <div class="status-bar">
        🟢 服务运行中 | 端口：8081 | 环境：开发环境
      </div>
    </div>
  </div>
</body>
</html>
