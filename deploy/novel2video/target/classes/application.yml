# 小说转短视频平台 - 配置文件

server:
  port: 8081  # 避免与现有项目冲突，使用 8081 端口

spring:
  application:
    name: novel2video
  
  # 数据源配置 - 使用现有数据库 ai-translation
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://123.56.22.101:13306/ai-translation?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: nnnnn520
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      table-underline: true
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.novel2video.entity

# 日志配置
logging:
  level:
    root: INFO
    com.novel2video: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 火山引擎 Ark 配置
huoshan:
  api-key: ${HUOSHAN_API_KEY:8a1298b6-a9fa-4cd5-b915-fee0bfe8ec90}
  base-url: https://ark.cn-beijing.volces.com/api/v3
  video-model: doubao-seedance-1-5-pro-251215
  image-model: doubao-seedream-4-5-251128
  default-n: 1
  default-size: 1024x1024

# Kimi AI 配置
ai:
  kimi:
    api-key: ${KIMI_API_KEY:sk-BI29b3F3D50HfPa72NQgHhPbmtoja26hyebt6xTeNU49Ctzm}
    base-url: https://api.moonshot.cn/v1
    model: kimi-latest  # 默认经典版
    # model: kimi-code-preview  # Kimi Code（代码专用，待验证密钥）
    # model: kimi-k2-0711-preview  # Kimi 2.5

# 阿里云 OSS 配置
aliyun:
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    access-key-id: ${OSS_ACCESS_KEY_ID:${OSS_ACCESS_KEY_ID}}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:${OSS_ACCESS_KEY_SECRET}}
    bucket-name: translation-service
    region: cn-beijing
