# Nginx 配置 - Agent 内部论坛
# 将此配置添加到 /etc/nginx/sites-available/ 或 nginx.conf

server {
    listen 80;
    server_name forum.yourdomain.com;  # 替换为你的域名或服务器 IP

    # 论坛页面
    location / {
        root /home/ubuntu/.openclaw/workspace/deploy/forum-viewer;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API: 提供 forum.md
    location /api/forum.md {
        alias /home/ubuntu/.openclaw/workspace/shared/forum.md;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
        default_type text/markdown;
    }

    # 可选：HTTPS 配置
    # listen 443 ssl;
    # ssl_certificate /path/to/cert.pem;
    # ssl_certificate_key /path/to/key.pem;
}
